# three_kit_config.yaml
# Example configuration for the three-kit demo flow.
#
# Demonstrates:
#   - 3 PVT corners (corner-based kits generate one target per corner)
#   - rename_map (old library name -> new library name)
#   - kit_options (per-kit overrides)
#   - debug: true  ->  upload is skipped (safe for demo)

library_name: demo_lib_7nm
ref_library_path: /data/ref_libs/demo_lib_7nm  # not used by mock commands
output_root: /tmp/repack_demo_output

pvts:
  - ss_0p75v_125c
  - tt_0p85v_25c
  - ff_0p99v_m40c

cells:
  - INV_X1
  - NAND2_X1
  - BUF_X2

rename_map:
  demo_lib_7nm: demo_lib_7nm_trimmed

# debug: true skips the upload step
debug: true

executor_type: local
max_workers: 4
upload_dest: /release/demo_lib_7nm   # ignored when debug: true

kit_options:
  timing_db:
    compile_flags: "-no_pg"

specs:
  global:
    cells_version: "2.1"
  kits:
    liberty:
      trim_mode: conservative
    timing_db:
      db_format: "2017.06"
    lef:
      layer_version: "8.5"
