# three_kit_config.yaml
# Example configuration for the three-kit demo flow.
#
# Demonstrates:
#   - library_name: identifier for output naming
#   - 3 PVT corners (kits with per-PVT targets read from extra.pvts)
#   - kit_options in extra (per-kit overrides)
#   - Domain-specific data in extra (pvts, cells, source_lib, etc.)

library_name: demo_lib_7nm_trimmed

# ── Paths ──
output_root: /tmp/kitdag_demo_output
upload_dest: /release/demo_lib_7nm_trimmed

# ── Execution ──
executor_type: local
max_workers: 4

# ── Spec Hashing (incremental detection) ──
specs:
  global:
    cells_version: "2.1"
  kits:
    liberty:
      trim_mode: conservative
    timing_db:
      db_format: "2017.06"
    lef:
      layer_version: "8.5"

# ── Domain-specific data ──
extra:
  pvts:
    - ss_0p75v_125c
    - tt_0p85v_25c
    - ff_0p99v_m40c
  cells:
    - INV_X1
    - NAND2_X1
    - BUF_X2
  source_lib: /data/source_libs/demo_lib_7nm
  kit_options:
    timing_db:
      compile_flags: "-no_pg"
